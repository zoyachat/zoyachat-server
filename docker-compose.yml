version: '3.8'

services:
  zoyachat-server:
    build: .
    ports:
      - "9100:9100"
    volumes:
      - server-data:/app/data
    environment:
      - PORT=9100
      - JWT_SECRET=${JWT_SECRET:-zoyachat-production-secret}
      - MAX_CONNECTIONS=500
      - MAX_FILE_SIZE=52428800
    restart: unless-stopped

volumes:
  server-data:
